<!DOCTYPE html>
<html>
    <head>
        <title>Mortgage Payment Calculator</title>
        <link rel="stylesheet" href="Project2.css">
    </head>
    <body>
        <header>
            <h1>Mortgage Payment Calculator</h1>
            <hr>
        </header>
        <div class="content">
            <div class="topRow">
                <h2>Principle:</h2>
                <form oninput="calculate()">
                    <div class="inputbox">
                        <p>$<input type="number" id="principle"></p>
                    </div>
                </form>
            </div>
            <div class="topRow">
                <h2>Yearly Rate:</h2>
                <form oninput="calculate()">
                    <div class="inputbox">
                        <p><input type="number" id="yearlyRate">%</p>
                    </div>
                </form>
            </div>
            <div class="topRow">
                <h2>Length of Mortgage:</h2>
                <form oninput="calculate()">
                    <div class="inputbox">
                        <select id="lengthOfMortgage">
                            <option value="10">10 years</option>
                            <option value="15">15 years</option>
                            <option value="30">30 years</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="bottomRow">
                <h2>Formula</h2>
                <img src="Formula.png" alt="Formula">
            </div>
            <div class="bottomRow">
                <h2>Payment:</h2>
                <p><span id="paymentspan"></span></p>
            </div>
        </div>
        <script src="Project2.js"></script>
        <footer>
            <p id="link"><a href="https://github.com/owen1045/Project2" target="_blank"> Github</a></p>
        </footer>
    </body>
</html>
